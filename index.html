<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Detective 🔍 </title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Poppins', sans-serif;
    background: #faf3e7;
    background-image:
      radial-gradient(#e8dcc4 1px, transparent 1px);
    background-size: 22px 22px;
    color:#3b2f2f;
    min-height:100vh;
    padding-bottom:50px;
  }

  nav {
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 6%;
    background:#3b2f2f;
    color:#faf3e7;
  }
  nav h2 { font-family:'Anton', sans-serif; font-size:1.5rem; letter-spacing:0.03em; text-transform:uppercase; }
  nav small { font-size:0.75rem; opacity:0.7; }

  .hero {
    text-align:center;
    padding:50px 20px 20px;
    position:relative;
  }
  .magnifier {
    font-size:2.8rem;
    display:inline-block;
    animation: search 3.5s ease-in-out infinite;
  }
  @keyframes search {
    0%   { transform: translate(-40px,0) rotate(-8deg); }
    25%  { transform: translate(20px,-6px) rotate(6deg); }
    50%  { transform: translate(40px,4px) rotate(-4deg); }
    75%  { transform: translate(-10px,6px) rotate(8deg); }
    100% { transform: translate(-40px,0) rotate(-8deg); }
  }
  .hero h1 {
    font-family:'Anton', sans-serif;
    font-size:2.8rem;
    text-transform:uppercase;
    letter-spacing:0.01em;
    color:#3b2f2f;
    margin:10px 0;
    line-height:1.15;
  }
  .highlight-marker{
    position:relative;
    display:inline-block;
    color:#3b2f2f; /* Black text */
    z-index:1;
}

.highlight-marker{
    position:relative;
    display:inline-block;
    color:#3b2f2f; /* Black text */
    z-index:1;
}

.highlight-marker::before{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    width:0%;
    height:1em;
    background:#ff6b6b; /* Red highlight */
    z-index:-1;
    border-radius:4px;
    animation:highlightSweep 1.2s ease-out forwards;
    animation-delay:0.3s;
}

@keyframes highlightSweep{
    from{
        width:0%;
    }
    to{
        width:100%;
    }
}

  .hero p {
    max-width:460px;
    margin:0 auto;
    color:#6b5b4f;
    font-size:0.92rem;
  }

  .card {
    max-width:540px;
    margin:34px auto;
    background:#fffdf8;
    border:2px solid #3b2f2f;
    border-radius:14px;
    padding:28px;
    box-shadow:6px 6px 0px #d8c9a3;
    position:relative;
  }
  .card::before {
    content:"CASE FILE #01";
    position:absolute; top:-14px; left:20px;
    background:#c0392b; color:#fff;
    font-size:0.7rem; padding:4px 10px; border-radius:6px;
    font-family:'Poppins'; letter-spacing:0.05em;
  }
  .card h3 {
    font-family:'Anton', sans-serif;
    font-size:1.2rem;
    text-transform:uppercase;
    margin-bottom:16px;
    color:#3b2f2f;
    border-bottom: 2px dashed #d8c9a3;
    padding-bottom:10px;
  }

  .form-group { margin-bottom:14px; }
  label { display:block; font-size:0.8rem; color:#8a7a6b; margin-bottom:5px; }
  input, textarea {
    width:100%; padding:10px 12px;
    border:1.5px solid #d8c9a3; border-radius:8px;
    background:#fffef9; color:#3b2f2f; font-family:'Poppins'; font-size:0.88rem;
  }
  input:focus, textarea:focus { outline:none; border-color:#c0392b; }

  .readout{ font-size:0.75rem; color:#8a7a6b; margin-top:5px; min-height:14px; }

  select {
    width:100%; padding:10px 36px 10px 12px;
    border:1.5px solid #d8c9a3; border-radius:8px;
    background:#fffef9; color:#3b2f2f; font-family:'Poppins'; font-size:0.88rem;
    appearance:none; -webkit-appearance:none; -moz-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='%233b2f2f'><path d='M5.5 7.5l4.5 4.5 4.5-4.5' stroke='%233b2f2f' stroke-width='1.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat;
    background-position:right 12px center;
    cursor:pointer;
  }
  select:focus { outline:none; border-color:#c0392b; }
  select option { font-family:'Poppins', sans-serif; color:#3b2f2f; background:#fffef9; }
  select:invalid { color:#8a7a6b; }

  .section-label {
    font-family:'Anton', sans-serif;
    font-size:0.85rem;
    letter-spacing:0.03em;
    text-transform:uppercase;
    color:#c0392b;
    margin:18px 0 10px;
  }

  .toggle-group { display:flex; gap:10px; }
  .toggle-btn {
    flex:1;
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:9px 12px;
    border:1.5px solid #d8c9a3; border-radius:8px;
    background:#fffef9; color:#3b2f2f;
    font-size:0.85rem; font-family:'Poppins';
    cursor:pointer;
    transition:0.15s;
    user-select:none;
  }
  .toggle-btn::before {
    content:"";
    width:13px; height:13px;
    border-radius:50%;
    border:2px solid #d8c9a3;
    background:#fffef9;
    display:inline-block;
    box-sizing:border-box;
    transition:0.15s;
  }
  .toggle-btn:hover { border-color:#c0392b; }
  .toggle-btn.active {
    border-color:#c0392b;
    background:#fbeceb;
    color:#c0392b;
    font-weight:600;
  }
  .toggle-btn.active::before {
    border-color:#c0392b;
    background:#c0392b;
    box-shadow: inset 0 0 0 2.5px #fbeceb;
  }

  .slider-row{ display:flex; align-items:center; gap:12px; }
  input[type=range]{
    flex:1; appearance:none; -webkit-appearance:none; height:6px; border-radius:3px;
    background:linear-gradient(90deg, #c0392b var(--fill,50%), #d8c9a3 var(--fill,50%));
    border:none; padding:0;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:18px; height:18px; border-radius:50%;
    background:#fffef9; border:2.5px solid #c0392b; cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:18px; height:18px; border-radius:50%;
    background:#fffef9; border:2.5px solid #c0392b; cursor:pointer;
  }
  .slider-val{ font-family:'Poppins'; font-size:0.85rem; color:#c0392b; font-weight:600; width:44px; text-align:right; }

  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:480px){ .two-col{grid-template-columns:1fr;} }

  button {
    width:100%; margin-top:8px; padding:13px;
    border:none; border-radius:10px;
    background:#c0392b; color:#fff;
    font-family:'Anton', sans-serif;
    letter-spacing:0.03em; text-transform:uppercase;
    font-size:1rem; cursor:pointer;
    transition:0.15s;
  }
  button:hover { background:#a5321f; transform:translateY(-1px); }
  button:disabled { opacity:0.6; cursor:wait; }

  .result {
    display:none; margin-top:20px; padding:18px;
    border-radius:10px; text-align:center; border:2px dashed;
  }
  .result.show { display:block; animation:pop 0.35s ease; }
  @keyframes pop { from{opacity:0; transform:scale(0.9)} to{opacity:1; transform:scale(1)} }
  .result h2 { font-family:'Anton', sans-serif; text-transform:uppercase; font-size:1.5rem; margin-bottom:4px; }
  .result p { font-size:0.85rem; color:#6b5b4f; }
  .fake { background:#fbeceb; border-color:#c0392b; }
  .fake h2 { color:#c0392b; }
  .real { background:#eaf6ef; border-color:#2e8b57; }
  .real h2 { color:#2e8b57; }

  footer hr{
    width:80%;
    margin:18px auto;
    border:0;
    border-top:1px solid #d8c9a3;
    justify-content: center;
}

.team-heading{
    color:#000000;          /* Red heading */
    font-size:1.2rem;
    margin-bottom:12px;
    text-align:center;
}

.team-list{
    list-style:none;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:0;
    margin-bottom:15px;
}

.team-list li{
    color:black  ;       /* Green names */
    font-family:'Poppins',sans-serif;
    font-size:0.95rem;
    font-weight:600;
    transition:0.3s;
}

.team-list li:hover{
    color:#c0392b;          /* Red on hover */
    transform:translateY(-2px);
}

.footer-text{
    color:#8a7a6b;
    font-family:'Anton',sans-serif;
    letter-spacing:0.03em;
    text-align:center;
}
</style>
</head>
<body>

<nav>
  <h2>🔎 Social Detective</h2>
  <small>Hackathon Project</small>
</nav>

<div class="hero">
  <div class="magnifier">🔍</div>
  
  <h1>
    Catching <span class="highlight-marker">bot accounts</span><br>
    red-handed
  </h1>
</div>

<div class="card">
  <h3>Enter Suspect Details</h3>
  <form id="scanForm">

    <div class="two-col">
      <div class="form-group">
        <label>Account ID</label>
        <input type="text" id="accId" placeholder="e.g. ACC10293" required>
        <div class="readout" id="handleReadout"></div>
      </div>
      <div class="form-group">
        <label>Platform</label>
        <select id="platform" required>
          <option value="" disabled selected>Select platform</option>
          <option value="instagram">Instagram</option>
          <option value="X">X</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Date Joined</label>
      <input type="date" id="dateJoined" required>
      <div class="readout" id="ageReadout"></div>
    </div>

    <div class="section-label">Profile Signals</div>
    <div class="two-col">
      <div class="form-group">
        <label>Has Profile Picture?</label>
        <div class="toggle-group" data-target="hasPfp">
          <div class="toggle-btn" data-value="1">Yes</div>
          <div class="toggle-btn" data-value="0">No</div>
        </div>
        <input type="hidden" id="hasPfp">
      </div>
      <div class="form-group">
        <label>Has Bio?</label>
        <div class="toggle-group" data-target="hasBio">
          <div class="toggle-btn" data-value="1">Yes</div>
          <div class="toggle-btn" data-value="0">No</div>
        </div>
        <input type="hidden" id="hasBio">
      </div>
    </div>

    <div class="form-group">
      <label>Bio Length</label>
      <input type="number" id="bioLength" step="any" placeholder="e.g. 45" min="0">
    </div>

    <div class="section-label">Network Signals</div>
    <div class="two-col">
      <div class="form-group">
        <label>Followers</label>
        <input type="number" id="followers" step="any" placeholder="e.g. 120" min="0">
      </div>
      <div class="form-group">
        <label>Following</label>
        <input type="number" id="following" step="any" placeholder="e.g. 3400" min="0">
      </div>
    </div>

    <div class="form-group">
      <label>Verified?</label>
      <div class="toggle-group" data-target="verified">
        <div class="toggle-btn" data-value="1">Yes</div>
        <div class="toggle-btn" data-value="0">No</div>
      </div>
      <input type="hidden" id="verified">
    </div>

    <div class="form-group">
      <label>Profile Completeness</label>
      <div class="slider-row">
        <input type="range" id="profileCompleteness" min="0" max="100" value="50">
        <span class="slider-val" id="profileCompletenessVal">50%</span>
      </div>
    </div>

    <div class="section-label">Behavioral Signals</div>
    <div class="two-col">
      <div class="form-group">
        <label>Avg Posts / Day</label>
        <input type="number" id="postRate" step="any" placeholder="e.g. 6.2" min="0">
      </div>
      <div class="form-group">
        <label>Avg Time Between Posts (mins)</label>
        <input type="number" id="avgTimeBetweenPosts" placeholder="e.g. 25">
      </div>
    </div>

    <div class="form-group">
      <label>Duplicate Post Content Ratio</label>
      <div class="slider-row">
        <input type="range" id="dupRatio" min="0" max="100" value="20">
        <span class="slider-val" id="dupRatioVal">20%</span>
      </div>
    </div>

    <div class="form-group">
      <label>Device Fingerprint Diversity</label>
      <input type="number" id="deviceDiversity" placeholder="e.g. 2" min="0">
    </div>

    <input type="hidden" id="usernameDigitRatio">
    <input type="hidden" id="usernameLength">
    <input type="hidden" id="accAge">

    <button type="submit" class="submit">Run Investigation 🕵️</button>
  </form>

  <div class="result" id="result"></div>
</div>

<footer>

    <hr>

    <h3 class="team-heading">Ctrl+Shift+n</h3>

    <ul class="team-list">
        <li>Dhanvin</li><br>
        <li>Atharva</li><br>
        <li>Ananya</li><br>
        <li>Hetvi</li><br>
    </ul>

    <hr>

</footer>
<script>
  // toggle buttons
  document.querySelectorAll('.toggle-group').forEach(group=>{
    const hidden = document.getElementById(group.dataset.target);
    group.querySelectorAll('.toggle-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        group.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        hidden.value = btn.dataset.value;
      });
    });
  });

  // auto-calc username signals from Account ID
  const accId = document.getElementById('accId');
  accId.addEventListener('input', ()=>{
    const v = accId.value.trim();
    const digits = (v.match(/\d/g)||[]).length;
    const len = v.length;
    const ratio = len ? +(digits/len).toFixed(2) : 0;
    document.getElementById('usernameLength').value = len;
    document.getElementById('usernameDigitRatio').value = ratio;
    document.getElementById('handleReadout').textContent = len ? `${len} chars · ${(ratio*100).toFixed(0)}% digits` : '';
  });

  // date joined -> account age in days
  const dateJoined = document.getElementById('dateJoined');
  dateJoined.addEventListener('change', ()=>{
    const chosen = new Date(dateJoined.value);
    const days = Math.max(0, Math.floor((Date.now()-chosen)/86400000));
    document.getElementById('accAge').value = days;
    document.getElementById('ageReadout').textContent = `${days} day${days===1?'':'s'} since joining`;
  });

  // sliders
  ['profileCompleteness','dupRatio'].forEach(id=>{
    const el = document.getElementById(id);
    const val = document.getElementById(id+'Val');
    const update = ()=>{ val.textContent = el.value+'%'; el.style.setProperty('--fill', el.value+'%'); };
    el.addEventListener('input', update); update();
  });

  // submit -> mock scoring (swap with real API call to your model backend)
  const form = document.getElementById('scanForm');
  form.addEventListener('submit', e=>{
    e.preventDefault();
    const btn = form.querySelector('.submit');
    btn.disabled = true; btn.textContent = 'Scanning…';

    const g = id => +(document.getElementById(id).value || 0);
    let risk = 0;
    if(!g('hasPfp')) risk += 15;
    if(!g('hasBio')) risk += 8;
    if(g('verified')) risk -= 25;
    risk += g('usernameDigitRatio')*20;
    risk += (g('dupRatio')/100)*30;
    risk += (100-g('profileCompleteness'))*0.2;
    if(g('following') > g('followers')*10) risk += 15;
    if(g('accAge') < 30) risk += 10;
    risk = Math.max(2, Math.min(98, Math.round(risk)));

    setTimeout(()=>{
      btn.disabled = false; btn.textContent = 'Run Investigation 🕵️';
      const isFake = risk >= 50;
      const result = document.getElementById('result');
      result.className = 'result show ' + (isFake ? 'fake' : 'real');
      result.innerHTML = `<h2>${isFake ? 'FAKE ACCOUNT' : 'LIKELY REAL'}</h2><p>Confidence score: ${risk}% risk</p>`;
    }, 900);
  });
</script>
</body>
</html>
